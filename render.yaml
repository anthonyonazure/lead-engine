services:
  - type: web
    name: lead-engine
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: LEAD_ENGINE_DEMO_MODE
        value: 'true'
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LEAD_ENGINE_DB
        value: /tmp/leads.db
      - key: LEAD_ENGINE_PORT
        value: '10000'
      - key: VITE_LEAD_ENGINE_DEMO_MODE
        value: 'true'
